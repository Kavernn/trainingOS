<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TrainingOS</title>
  <style>
    :root {
      --bg: #0f0f17;
      --accent: #f97316;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 32px;
      max-width: 360px;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(249, 115, 22, 0.3);
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.5;
    }

    .offline-icon {
      font-size: 48px;
      margin-bottom: -8px;
    }

    .badge {
      background: rgba(249, 115, 22, 0.12);
      border: 1px solid rgba(249, 115, 22, 0.3);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      color: var(--accent);
    }

    .retry-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }

    .retry-btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="../static/icons/icon-192.png" alt="TrainingOS" />
    <h1 class="title">TrainingOS</h1>
    <div class="offline-icon">📡</div>
    <div class="badge">Pas de connexion internet</div>
    <p class="subtitle">
      TrainingOS nécessite une connexion pour charger tes données d'entraînement.
      Vérifie ta connexion et réessaie.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      Réessayer
    </button>
  </div>

  <script type="module">
    import { Network } from '@capacitor/network';
    import { SplashScreen } from '@capacitor/splash-screen';
    import { StatusBar, Style } from '@capacitor/status-bar';

    async function init() {
      // Hide splash screen
      await SplashScreen.hide();

      // Configure status bar
      await StatusBar.setStyle({ style: Style.Dark });
      await StatusBar.setBackgroundColor({ color: '#0f0f17' });

      // Watch network — reload as soon as connectivity is restored
      Network.addListener('networkStatusChange', (status) => {
        if (status.connected) {
          window.location.reload();
        }
      });
    }

    init().catch(console.error);
  </script>
</body>
</html>
