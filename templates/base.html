<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}VinceSeven{% endblock %}</title>

  <!-- PWA -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#f97316">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VinceSeven">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/main.css">

  {% block extra_css %}{% endblock %}
</head>

<body>

  <!-- HEADER -->
  <header class="top-header">
    <span class="logo">💪 VINCESEVEN</span>
    <div class="meta">
      <div id="header-day"></div>
      <div id="header-week"></div>
    </div>
  </header>
  <script>
    (function() {
      const d = new Date();
      document.getElementById('header-day').textContent =
        d.toLocaleDateString('fr-CA', { weekday: 'long', day: 'numeric', month: 'short' });
      // Semaine relative au programme (début 2026-03-03)
      const START = new Date(2026, 2, 3); // 3 mars 2026
      const diffDays = Math.floor((d - START) / 86400000);
      const week = Math.max(1, Math.floor(diffDays / 7) + 1);
      document.getElementById('header-week').textContent = 'Semaine ' + week;
    })();
  </script>

  <!-- CONTENU -->
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    Accueil
  </a>
  <a href="/seance" class="nav-item {% if request.path == '/seance' %}active{% endif %}">
    <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12M2 7h4M18 7h4M2 17h4M18 17h4"/></svg>
    Séance
  </a>
  <a href="/timer" class="nav-item {% if request.path == '/timer' %}active{% endif %}">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><polyline points="12,9 12,13 14,15"/><path d="M9 3h6M12 3v2"/></svg>
    Timer
  </a>
  <a href="/stats" class="nav-item {% if request.path == '/stats' %}active{% endif %}">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Stats
  </a>
  <a href="/profil" class="nav-item {% if request.path == '/profil' %}active{% endif %}">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profil
  </a>

</nav>

  <!-- TOAST -->
  <div id="toast"></div>

 <!-- JS GLOBAL -->
  <script>
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'show ' + type;
      setTimeout(() => t.className = '', 3000);
    }
  </script>

  <!-- Banner mise à jour -->
  <div id="update-banner" style="
    display:none; position:fixed; top:0; left:0; right:0; z-index:999;
    background:var(--orange); color:white; text-align:center;
    padding:10px 16px; font-family:'Barlow Condensed',sans-serif;
    font-size:0.9rem; font-weight:700; letter-spacing:1px;
    box-shadow:0 2px 12px rgba(0,0,0,0.4); cursor:pointer;
  " onclick="window.location.reload(true)">
    🔄 Nouvelle version disponible — Tap pour mettre à jour
  </div>

  <!-- ── CAPACITOR NATIVE BRIDGE ──────────────────────────────────────────── -->
  <script>
  /**
   * haptic(style) — feedback haptique via Capacitor (iOS natif).
   * Silencieux sur web/PWA installée.
   * Styles : 'light' | 'medium' | 'heavy' | 'success' | 'warning' | 'error'
   */
  window.haptic = (function() {
    const CAP = window.Capacitor;
    if (!CAP || !CAP.isNativePlatform || !CAP.isNativePlatform()) return () => {};

    const Haptics = CAP.Plugins && CAP.Plugins.Haptics;
    if (!Haptics) return () => {};

    const IMPACT  = { light: 'LIGHT', medium: 'MEDIUM', heavy: 'HEAVY' };
    const NOTIFY  = { success: 'SUCCESS', warning: 'WARNING', error: 'ERROR' };

    return function haptic(style = 'medium') {
      try {
        if (NOTIFY[style]) {
          Haptics.notification({ type: NOTIFY[style] });
        } else {
          Haptics.impact({ style: IMPACT[style] || 'MEDIUM' });
        }
      } catch (_) {}
    };
  })();
  </script>

  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(registration => {
          // Vérifie les updates toutes les 60s
          setInterval(() => registration.update(), 60000);

          registration.addEventListener('updatefound', () => {
            const newSW = registration.installing;
            newSW.addEventListener('statechange', () => {
              // Quand le nouveau SW est installé et qu'un ancien existe → affiche banner
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                document.getElementById('update-banner').style.display = 'block';
              }
            });
          });
        })
        .catch(err => console.error('SW error:', err));

      // Si le SW prend le contrôle pendant la session → reload automatique
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; window.location.reload(); }
      });
    });
  }
</script>

  {% block extra_js %}{% endblock %}

</body>
</html>
