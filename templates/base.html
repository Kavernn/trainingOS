<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TrainingOS{% endblock %}</title>

  <!-- PWA -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#f97316">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrainingOS">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── RESET & BASE ─────────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --orange:   #f97316;
      --orange2:  #ea580c;
      --green:    #22c55e;
      --blue:     #3b82f6;
      --purple:   #a855f7;
      --rose:     #f43f5e;
      --bg:       #0f0f13;
      --bg2:      #1a1a24;
      --bg3:      #22222f;
      --border:   #2a2a3a;
      --text:     #e0e0e0;
      --muted:    #666677;
      --radius:   12px;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px; /* espace pour la navbar mobile */
    }

    /* ── TYPOGRAPHY ───────────────────────────────────── */
    h1, h2, h3 {
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 1px;
    }

    h1 { font-size: 2rem;  font-weight: 800; }
    h2 { font-size: 1.4rem; font-weight: 700; }
    h3 { font-size: 1.1rem; font-weight: 600; }

    a { color: var(--orange); text-decoration: none; }
    a:hover { color: var(--orange2); }

    /* ── LAYOUT ───────────────────────────────────────── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    /* ── CARDS ────────────────────────────────────────── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── BUTTONS ──────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: var(--orange);
      color: white;
    }
    .btn-primary:hover {
      background: var(--orange2);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .btn-success {
      background: var(--green);
      color: white;
    }

    .btn-block {
      width: 100%;
      justify-content: center;
    }

    /* ── BADGES ───────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-orange { background: var(--orange)22; color: var(--orange); border: 1px solid var(--orange)44; }
    .badge-green  { background: var(--green)22;  color: var(--green);  border: 1px solid var(--green)44;  }
    .badge-blue   { background: var(--blue)22;   color: var(--blue);   border: 1px solid var(--blue)44;   }
    .badge-red    { background: var(--rose)22;   color: var(--rose);   border: 1px solid var(--rose)44;   }

    /* ── PROGRESS BAR ─────────────────────────────────── */
    .progress-wrap {
      background: var(--bg3);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--orange), var(--orange2));
      transition: width 0.5s ease;
    }

    /* ── FORMS ────────────────────────────────────────── */
    input, select, textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--orange);
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-group { margin-bottom: 16px; }

    /* ── ALERTS ───────────────────────────────────────── */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    .alert-warning {
      background: #f9731622;
      border: 1px solid #f9731644;
      color: var(--orange);
    }

    .alert-success {
      background: #22c55e22;
      border: 1px solid #22c55e44;
      color: var(--green);
    }

    .alert-info {
      background: #3b82f622;
      border: 1px solid #3b82f644;
      color: var(--blue);
    }

    /* ── TABLE ────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border)88;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg3); }

    /* ── HEADER ───────────────────────────────────────── */
    .top-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .top-header .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: 2px;
    }

    .top-header .meta {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: right;
    }

    /* ── BOTTOM NAV (mobile) ──────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 12px;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--muted);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 8px;
      transition: color 0.15s;
      cursor: pointer;
      text-decoration: none;
    }

    .nav-item.active, .nav-item:hover {
      color: var(--orange);
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── TOAST NOTIFICATION ───────────────────────────── */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 24px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 200;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--rose);  color: var(--rose);  }

    /* ── UTILS ────────────────────────────────────────── */
    .text-orange { color: var(--orange); }
    .text-green  { color: var(--green);  }
    .text-muted  { color: var(--muted);  }
    .text-rose   { color: var(--rose);   }
    .mt-8  { margin-top: 8px;  }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mb-8  { margin-bottom: 8px;  }
    .mb-16 { margin-bottom: 16px; }
    .flex  { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-8  { gap: 8px;  }
    .gap-16 { gap: 16px; }
    .w-full { width: 100%; }
  </style>

  {% block extra_css %}{% endblock %}
</head>

<body>

  <!-- HEADER -->
  <header class="top-header">
    <span class="logo">💪 TRAININGOS</span>
    <div class="meta">
      <div>{{ now if now else '' }}</div>
      <div>Semaine {{ week if week else '' }}</div>
    </div>
  </header>

  <!-- CONTENU -->
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    Accueil
  </a>
  <a href="/seance" class="nav-item {% if request.path == '/seance' %}active{% endif %}">
    <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12M2 7h4M18 7h4M2 17h4M18 17h4"/></svg>
    Séance
  </a>
  <a href="/timer" class="nav-item {% if request.path == '/timer' %}active{% endif %}">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><polyline points="12,9 12,13 14,15"/><path d="M9 3h6M12 3v2"/></svg>
    Timer
  </a>
  <a href="/stats" class="nav-item {% if request.path == '/stats' %}active{% endif %}">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Stats
  </a>
  <a href="/profil" class="nav-item {% if request.path == '/profil' %}active{% endif %}">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profil
  </a>

</nav>

  <!-- TOAST -->
  <div id="toast"></div>

 <!-- JS GLOBAL -->
  <script>
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'show ' + type;
      setTimeout(() => t.className = '', 3000);
    }
  </script>

  <!-- Banner mise à jour -->
  <div id="update-banner" style="
    display:none; position:fixed; top:0; left:0; right:0; z-index:999;
    background:var(--orange); color:white; text-align:center;
    padding:10px 16px; font-family:'Barlow Condensed',sans-serif;
    font-size:0.9rem; font-weight:700; letter-spacing:1px;
    box-shadow:0 2px 12px rgba(0,0,0,0.4); cursor:pointer;
  " onclick="window.location.reload(true)">
    🔄 Nouvelle version disponible — Tap pour mettre à jour
  </div>

  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/static/sw.js', { scope: '/' })
        .then(registration => {
          // Vérifie les updates toutes les 60s
          setInterval(() => registration.update(), 60000);

          registration.addEventListener('updatefound', () => {
            const newSW = registration.installing;
            newSW.addEventListener('statechange', () => {
              // Quand le nouveau SW est installé et qu'un ancien existe → affiche banner
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                document.getElementById('update-banner').style.display = 'block';
              }
            });
          });
        })
        .catch(err => console.error('SW error:', err));

      // Si le SW prend le contrôle pendant la session → reload automatique
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; window.location.reload(); }
      });
    });
  }
</script>

  {% block extra_js %}{% endblock %}

</body>
</html>
