{% extends "base.html" %}
{% block title %}Timer — TrainingOS{% endblock %}

{% block extra_css %}
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  /* ── FLASH OVERLAY ── */
  #flash-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.05s;
  }

  #flash-overlay.flash-work { background: rgba(249,115,22,0.18); }
  #flash-overlay.flash-rest { background: rgba(34,197,94,0.18); }
  #flash-overlay.active     { opacity: 1; }

  /* ── PHASE LABEL ── */
  .phase-wrap {
    width: 100%;
    max-width: 420px;
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .phase-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    padding: 5px 20px;
    border-radius: 4px;
    transition: all 0.3s;
  }

  .phase-label.work {
    background: var(--orange)22;
    border: 1px solid var(--orange)55;
    color: var(--orange);
  }

  .phase-label.rest {
    background: var(--green)22;
    border: 1px solid var(--green)55;
    color: var(--green);
  }

  .phase-label.idle {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  /* ── RING TIMER ── */
  .ring-container {
    position: relative;
    width: 280px;
    height: 280px;
    margin-bottom: 28px;
  }

  .ring-container svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .ring-bg {
    fill: none;
    stroke: var(--bg3);
    stroke-width: 10;
  }

  .ring-track {
    fill: none;
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.25s linear, stroke 0.4s ease;
    stroke-dasharray: 754;
    stroke-dashoffset: 0;
  }

  .ring-track.work { stroke: var(--orange); }
  .ring-track.rest { stroke: var(--green); }
  .ring-track.idle { stroke: var(--muted); }

  /* Tick marks */
  .ring-ticks {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .time-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 5.5rem;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -2px;
    transition: color 0.3s;
  }

  .time-display.work { color: var(--orange); }
  .time-display.rest { color: var(--green); }
  .time-display.idle { color: var(--text); }

  .round-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }

  .btn-ctrl {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    transition: all 0.15s;
    position: relative;
  }

  .btn-play {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    box-shadow: 0 4px 20px rgba(249,115,22,0.45);
    color: white;
  }

  .btn-play:hover {
    transform: scale(1.06);
    box-shadow: 0 6px 28px rgba(249,115,22,0.6);
  }

  .btn-play.running {
    background: rgba(249,115,22,0.12);
    border: 2px solid var(--orange);
    color: var(--orange);
    box-shadow: 0 0 16px rgba(249,115,22,0.2);
  }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn-reset:hover {
    border-color: var(--red);
    color: var(--red);
    transform: scale(1.05);
  }

  .btn-skip {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn-skip:hover {
    border-color: var(--blue);
    color: var(--blue);
    transform: scale(1.05);
  }

  /* ── SETTINGS ── */
  .settings-grid {
    width: 100%;
    max-width: 420px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .setting-card {
    background: rgba(17,17,28,0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    position: relative;
    overflow: hidden;
  }

  .setting-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }

  .setting-card.work-card::after { background: var(--orange); }
  .setting-card.rest-card::after { background: var(--green); }

  .setting-card.phase-active {
    box-shadow: 0 0 0 2px var(--orange);
    transform: scale(1.02);
  }
  .setting-card.rest-card.phase-active {
    box-shadow: 0 0 0 2px var(--green);
  }
  .setting-card { cursor: pointer; transition: all 0.15s; }
  .setting-card.rounds-card::after { background: var(--blue); }

  .setting-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .setting-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 10px;
  }

  .setting-card.work-card  .setting-value { color: var(--orange); }
  .setting-card.rest-card  .setting-value { color: var(--green); }
  .setting-card.rounds-card .setting-value { color: var(--blue); }

  .setting-btns {
    display: flex;
    gap: 6px;
  }

  .setting-btn {
    flex: 1;
    height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.12s;
  }

  .setting-btn:hover {
    background: rgba(255,255,255,0.08);
    transform: scale(1.05);
  }

  .setting-btn:active { transform: scale(0.96); }

  /* Quick presets */
  .presets {
    width: 100%;
    max-width: 420px;
    margin-bottom: 20px;
  }

  .presets-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .presets-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .preset-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(8px);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }

  .preset-btn:hover, .preset-btn.active {
    background: var(--orange)22;
    border-color: var(--orange)66;
    color: var(--orange);
  }

  /* ── ROUNDS CARD (pleine largeur) ── */
  .rounds-card {
    grid-column: span 2;
  }

  .rounds-card .setting-value { color: var(--blue); }

  /* ── HISTORY ── */
  .history-row {
    width: 100%;
    max-width: 420px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .history-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    transition: all 0.2s;
  }

  .history-dot.done-work { background: var(--orange); }
  .history-dot.done-rest { background: var(--green); }
  .history-dot.pending   { background: var(--bg3); border: 1px solid var(--border); }

  /* ── TOTAL TIME ── */
  .total-time {
    width: 100%;
    max-width: 420px;
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 8px;
  }

  .total-time span {
    color: var(--text);
    font-weight: 600;
  }

  /* ── PULSE ANIMATION ── */
  @keyframes pulseRing {
    0%   { transform: scale(1); opacity: 1; }
    50%  { transform: scale(1.04); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
  }

  .ring-container.pulsing svg { animation: pulseRing 0.5s ease 3; }

  @keyframes flashBg {
    0%, 100% { opacity: 0; }
    25%, 75%  { opacity: 1; }
  }

  .flashing { animation: flashBg 0.4s ease 3; }

  /* ── RESPONSIVE MOBILE ── */
  @media (max-width: 520px) {
    body { padding: 10px 10px 80px; }

    .ring-container {
      width: min(240px, 72vw);
      height: min(240px, 72vw);
      margin-bottom: 18px;
    }

    .time-display { font-size: 3.8rem; letter-spacing: -1px; }

    .btn-play  { width: 68px; height: 68px; font-size: 1.3rem; }
    .btn-ctrl  { width: 54px; height: 54px; font-size: 1.2rem; }
    .controls  { gap: 10px; margin-bottom: 18px; }

    .settings-grid {
      gap: 8px;
      margin-bottom: 12px;
    }

    .setting-card { padding: 10px; }
    .setting-value { font-size: 1.6rem; margin-bottom: 8px; }
    .setting-btn   { height: 28px; font-size: 0.9rem; }

    .presets { margin-bottom: 12px; }
    .preset-btn { font-size: 0.72rem; padding: 5px 10px; }

    .phase-wrap { margin-bottom: 12px; }
    .history-dot { width: 10px; height: 10px; }
  }

  @media (max-width: 360px) {
    .ring-container {
      width: 200px;
      height: 200px;
    }
    .time-display { font-size: 3.2rem; }
    .btn-play  { width: 60px; height: 60px; }
    .btn-ctrl  { width: 48px; height: 48px; }
  }

</style>
{% endblock %}

{% block content %}
<div id="flash-overlay"></div>

<!-- Phase label -->
<div class="phase-wrap">
  <div class="phase-label idle" id="phase-label">PRÊT</div>
</div>

<!-- Ring -->
<div class="ring-container" id="ring-container">
  <svg viewBox="0 0 260 260">
    <circle class="ring-bg"    cx="130" cy="130" r="120"/>
    <circle class="ring-track idle" cx="130" cy="130" r="120" id="ring-track"/>
  </svg>
  <div class="ring-center">
    <div class="time-display idle" id="time-display">00:00</div>
    <div class="round-display"    id="round-display">ROUND —</div>
  </div>
</div>

<!-- Contrôles -->
<div class="controls">
  <button class="btn-ctrl btn-reset" id="btn-reset" onclick="resetTimer()" title="Reset">↺</button>
  <button class="btn-ctrl btn-play"  id="btn-play"  onclick="toggleTimer()">▶</button>
  <button class="btn-ctrl btn-skip"  id="btn-skip"  onclick="skipPhase()"  title="Passer la phase">⏭</button>
</div>

<!-- Settings -->
<div class="settings-grid">
  <div class="setting-card rest-card" id="card-rest" onclick="jumpToPhase('rest')" title="Tap pour démarrer le Rest">
    <div class="setting-label">💤 Rest <span id="rest-tap" style="font-size:0.55rem;color:var(--green);opacity:0;transition:opacity 0.3s;">▶ tap</span></div>
    <div class="setting-value" id="rest-display">0:20</div>
    <div class="setting-btns">
      <button class="setting-btn" onclick="event.stopPropagation();adjustTime('rest', -5)">−5s</button>
      <button class="setting-btn" onclick="event.stopPropagation();adjustTime('rest', +5)">+5s</button>
    </div>
  </div>

  <div class="setting-card work-card" id="card-work" onclick="jumpToPhase('work')" title="Tap pour démarrer le Work">
    <div class="setting-label">⚡ Work <span id="work-tap" style="font-size:0.55rem;color:var(--orange);opacity:0;transition:opacity 0.3s;">▶ tap</span></div>
    <div class="setting-value" id="work-display">0:40</div>
    <div class="setting-btns">
      <button class="setting-btn" onclick="event.stopPropagation();adjustTime('work', -5)">−5s</button>
      <button class="setting-btn" onclick="event.stopPropagation();adjustTime('work', +5)">+5s</button>
    </div>
  </div>

  <div class="setting-card rounds-card">
    <div class="setting-label">🔁 Rounds</div>
    <div class="setting-value" id="rounds-display">8</div>
    <div class="setting-btns">
      <button class="setting-btn" onclick="adjustRounds(-1)">−1</button>
      <button class="setting-btn" onclick="adjustRounds(+1)">+1</button>
      <button class="setting-btn" onclick="adjustRounds(-5)">−5</button>
      <button class="setting-btn" onclick="adjustRounds(+5)">+5</button>
    </div>
  </div>
</div>

<!-- Auto-start toggle -->
<div class="presets" style="margin-bottom:10px;">
  <div class="presets-label">Options</div>
  <div class="presets-row">
    <button class="preset-btn" id="autostart-btn" onclick="toggleAutoStart(this)">
      ⚡ Auto-start OFF
    </button>
  </div>
</div>

<!-- Presets -->
<div class="presets">
  <div class="presets-label">Presets rapides</div>
  <div class="presets-row">
    <button class="preset-btn" onclick="applyPreset(40,20,8,this)">Tabata</button>
    <button class="preset-btn" onclick="applyPreset(30,15,10,this)">30/15×10</button>
    <button class="preset-btn" onclick="applyPreset(60,30,6,this)">60/30×6</button>
    <button class="preset-btn" onclick="applyPreset(45,15,8,this)">45/15×8</button>
    <button class="preset-btn" onclick="applyPreset(20,10,8,this)">Tabata Court</button>
    <button class="preset-btn" onclick="applyPreset(90,30,5,this)">Shift Hockey</button>
  </div>
</div>

<!-- History dots -->
<div class="history-row" id="history-row"></div>

<!-- Total time -->
<div class="total-time" id="total-time"></div>

<script>
// ── STATE ─────────────────────────────────────────────
let workSecs   = 40;
let autoStart  = false; // Enchaîne work→rest→work sans pause
let restSecs   = 20;
let totalRounds = 8;

let currentRound = 1;
let phase        = 'idle'; // 'work' | 'rest' | 'idle' | 'done'
let remaining    = 0;
let interval     = null;
let running      = false;

// ── UTILS ─────────────────────────────────────────────
function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function fmtFull(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

// ── RING ──────────────────────────────────────────────
const CIRCUMFERENCE = 2 * Math.PI * 120; // r=120 → 754

function setRing(progress, ph) { // progress 0→1
  const track = document.getElementById('ring-track');
  const offset = CIRCUMFERENCE * (1 - progress);
  track.style.strokeDashoffset = offset;
  track.className = `ring-track ${ph}`;
}

// ── UI UPDATE ─────────────────────────────────────────
function updateUI() {
  const timeEl   = document.getElementById('time-display');
  const roundEl  = document.getElementById('round-display');
  const phaseEl  = document.getElementById('phase-label');

  timeEl.textContent  = fmt(remaining);
  timeEl.className    = `time-display ${phase}`;
  phaseEl.className   = `phase-label ${phase}`;

  if (phase === 'work') {
    phaseEl.textContent = '⚡ WORK';
    roundEl.textContent = `ROUND ${currentRound} / ${totalRounds}`;
    setRing(remaining / workSecs, 'work');
  } else if (phase === 'rest') {
    phaseEl.textContent = '💤 REST';
    roundEl.textContent = `ROUND ${currentRound} / ${totalRounds}`;
    setRing(remaining / restSecs, 'rest');
  } else if (phase === 'done') {
    phaseEl.textContent = '✅ TERMINÉ';
    phaseEl.className   = 'phase-label rest';
    timeEl.textContent  = '🏆';
    timeEl.className    = 'time-display rest';
    roundEl.textContent = `${totalRounds} ROUNDS FAITS`;
    setRing(1, 'rest');
  } else {
    phaseEl.textContent = 'PRÊT';
    phaseEl.className   = 'phase-label idle';
    roundEl.textContent = 'ROUND —';
    timeEl.className    = 'time-display idle';
    setRing(1, 'idle');
  }

  if (typeof updateCardHighlight === 'function') updateCardHighlight();
  updateHistoryDots();
  updateTotalTime();
}

function updateHistoryDots() {
  const row = document.getElementById('history-row');
  row.innerHTML = '';
  for (let i = 1; i <= totalRounds; i++) {
    const dot = document.createElement('div');
    dot.className = 'history-dot ';
    if (i < currentRound) {
      dot.className += 'done-work';
    } else if (i === currentRound && phase === 'rest') {
      dot.className += 'done-work';
    } else {
      dot.className += 'pending';
    }
    row.appendChild(dot);
  }
}

function updateTotalTime() {
  const total = (workSecs + restSecs) * totalRounds;
  const el = document.getElementById('total-time');
  el.innerHTML = `Durée totale estimée : <span>${fmtFull(total)}</span>`;
}

// ── FLASH + BEEP ──────────────────────────────────────
function flash(ph) {
  const overlay = document.getElementById('flash-overlay');
  overlay.className = `flash-${ph}`;
  overlay.classList.add('active');
  setTimeout(() => overlay.classList.remove('active'), 300);
  setTimeout(() => { overlay.classList.add('active'); setTimeout(() => overlay.classList.remove('active'), 300); }, 450);
  setTimeout(() => { overlay.classList.add('active'); setTimeout(() => overlay.classList.remove('active'), 300); }, 900);

  // Beep via Web Audio
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = ph === 'work' ? 880 : 440;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
    if (ph === 'done') {
      setTimeout(() => {
        const o2 = ctx.createOscillator(), g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.frequency.value = 1046;
        g2.gain.setValueAtTime(0.3, ctx.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        o2.start(ctx.currentTime); o2.stop(ctx.currentTime + 0.5);
      }, 350);
    }
  } catch(e) {}
}

// ── TIMER LOGIC ───────────────────────────────────────
function startPhase(ph) {
  phase     = ph;
  remaining = ph === 'work' ? workSecs : restSecs;
  updateUI();
}

function beepCountdown() {
  // Un bip par seconde à 3, 2, 1 — synchronisé avec le tick
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 1200;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.12);
  } catch(e) {}
}

function finishWork() {
  flash('rest');
  if (currentRound >= totalRounds) {
    clearInterval(interval); interval = null; running = false;
    phase = 'done'; updateUI();
    document.getElementById('btn-play').innerHTML = '▶';
    document.getElementById('btn-play').classList.remove('running');
    return;
  }
  if (autoStart) {
    startPhase('rest');
  } else {
    // Pause — attend que l'user reprenne
    clearInterval(interval); interval = null; running = false;
    startPhase('rest');
    document.getElementById('btn-play').innerHTML = '▶';
    document.getElementById('btn-play').classList.remove('running');
  }
}

function finishRest() {
  flash('work');
  currentRound++;
  if (autoStart) {
    startPhase('work');
  } else {
    clearInterval(interval); interval = null; running = false;
    startPhase('work');
    document.getElementById('btn-play').innerHTML = '▶';
    document.getElementById('btn-play').classList.remove('running');
  }
}

function tick() {
  remaining--;
  // Countdown beeps à 3, 2, 1 pendant WORK
  if (phase === 'work' && remaining <= 3 && remaining > 0) beepCountdown();
  if (remaining <= 0) {
    if (phase === 'work') finishWork();
    else finishRest();
  } else {
    updateUI();
  }
}

function toggleTimer() {
  const btn = document.getElementById('btn-play');
  if (running) {
    clearInterval(interval);
    interval = null;
    running  = false;
    btn.innerHTML = '▶';
    btn.classList.remove('running');
  } else {
    if (phase === 'idle' || phase === 'done') {
      currentRound = 1;
      startPhase('work');
      flash('work');
    }
    running  = true;
    interval = setInterval(tick, 1000);
    btn.innerHTML = '⏸';
    btn.classList.add('running');
  }
}

function resetTimer() {
  clearInterval(interval);
  interval     = null;
  running      = false;
  phase        = 'idle';
  currentRound = 1;
  remaining    = workSecs;
  document.getElementById('btn-play').innerHTML = '▶';
  document.getElementById('btn-play').classList.remove('running');
  updateUI();
  document.getElementById('time-display').textContent = fmt(workSecs);
  setRing(1, 'idle');
}

function skipPhase() {
  if (!running && phase === 'idle') return;
  clearInterval(interval);
  if (phase === 'work') {
    if (currentRound >= totalRounds) {
      running = false;
      phase   = 'done';
      document.getElementById('btn-play').innerHTML = '▶';
      document.getElementById('btn-play').classList.remove('running');
      updateUI();
      return;
    }
    flash('rest');
    startPhase('rest');
  } else {
    flash('work');
    currentRound++;
    startPhase('work');
  }
  if (running) interval = setInterval(tick, 1000);
}

// ── SETTINGS ─────────────────────────────────────────
function adjustTime(type, delta) {
  if (type === 'work') {
    workSecs = Math.max(5, workSecs + delta);
    document.getElementById('work-display').textContent = fmt(workSecs);
  } else {
    restSecs = Math.max(5, restSecs + delta);
    document.getElementById('rest-display').textContent = fmt(restSecs);
  }
  if (!running) resetTimer();
  updateTotalTime();
  clearActivePresets();
}

function adjustRounds(delta) {
  totalRounds = Math.max(1, Math.min(99, totalRounds + delta));
  document.getElementById('rounds-display').textContent = totalRounds;
  if (!running) resetTimer();
  updateTotalTime();
  clearActivePresets();
}

function applyPreset(work, rest, rounds, btn) {
  workSecs    = work;
  restSecs    = rest;
  totalRounds = rounds;
  document.getElementById('work-display').textContent   = fmt(workSecs);
  document.getElementById('rest-display').textContent   = fmt(restSecs);
  document.getElementById('rounds-display').textContent = totalRounds;
  clearActivePresets();
  btn.classList.add('active');
  if (!running) resetTimer();
  updateTotalTime();
}

function jumpToPhase(ph) {
  // Si timer en cours → switch de phase immédiatement
  // Si timer arrêté → démarre directement cette phase
  if (running) {
    clearInterval(interval);
    if (ph === 'rest') flash('rest');
    else flash('work');
    startPhase(ph);
    interval = setInterval(tick, 1000);
  } else {
    phase = 'idle';
    startPhase(ph);
    flash(ph);
    running  = true;
    interval = setInterval(tick, 1000);
    document.getElementById('btn-play').innerHTML = '⏸';
    document.getElementById('btn-play').classList.add('running');
  }
  updateCardHighlight();
}

function updateCardHighlight() {
  document.getElementById('card-work').classList.toggle('phase-active', phase === 'work');
  document.getElementById('card-rest').classList.toggle('phase-active', phase === 'rest');
  // Affiche les hints "tap" quand idle
  const idle = !running;
  document.getElementById('work-tap').style.opacity = idle ? '1' : '0';
  document.getElementById('rest-tap').style.opacity = idle ? '1' : '0';
}

function toggleAutoStart(btn) {
  autoStart = !autoStart;
  btn.textContent = autoStart ? '⚡ Auto-start ON' : '⚡ Auto-start OFF';
  btn.classList.toggle('active', autoStart);
}

function clearActivePresets() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}

// ── INIT ─────────────────────────────────────────────
document.getElementById('work-display').textContent   = fmt(workSecs);
document.getElementById('rest-display').textContent   = fmt(restSecs);
document.getElementById('rounds-display').textContent = totalRounds;
document.getElementById('time-display').textContent   = fmt(workSecs);
updateHistoryDots();
updateTotalTime();
setRing(1, 'idle');
</script>
{% endblock %}
